services:
  postgres:
    image: postgres:16-alpine
    container_name: biblioteca-livros-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: biblioteca_dev_local
      POSTGRES_DB: biblioteca_livros
    ports:
      - "5433:5432"
    volumes:
      - biblioteca_pg_data:/var/lib/postgresql/data

volumes:
  biblioteca_pg_data:
